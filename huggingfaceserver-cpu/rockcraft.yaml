# Based on https://github.com/kserve/kserve/blob/v0.17.0/python/huggingface_server_cpu.Dockerfile
# See ../CONTRIBUTING.md for more details about the patterns used in this rock.

name: huggingfaceserver-cpu
summary: HuggingFace server for KServe deployments (CPU-only)
description: "KServe HuggingFace server with PyTorch CPU + IPEX + vLLM (CPU)."
version: "0.17.0"
license: Apache-2.0
base: ubuntu@22.04
platforms:
  amd64:

run-user: _daemon_

services:
  huggingfaceserver:
    override: replace
    summary: "HuggingFace server (CPU)"
    startup: enabled
    command: "python -m huggingfaceserver [ dummy-arguments ]"
    environment:
      PYTHONPATH: /huggingfaceserver
      HF_HOME: "/tmp/huggingface"
      HF_HUB_DISABLE_TELEMETRY: "1"
      LD_PRELOAD: "/usr/lib/x86_64-linux-gnu/libtcmalloc.so.4:/usr/lib/x86_64-linux-gnu/libjemalloc.so.2"

entrypoint-service: huggingfaceserver

parts:
  security-team-requirement:
    plugin: nil
    override-build: |
      mkdir -p ${CRAFT_PART_INSTALL}/usr/share/rocks
      (echo "# os-release" && cat /etc/os-release && echo "# dpkg-query" && \
      dpkg-query --root=${CRAFT_PROJECT_DIR}/../bundles/ubuntu-22.04/rootfs/ -f '${db:Status-Abbrev},${binary:Package},${Version},${source:Package},${Source:Version}\n' -W) \
      > ${CRAFT_PART_INSTALL}/usr/share/rocks/dpkg.query

  python:
    plugin: nil
    source: https://github.com/kserve/kserve.git
    source-subdir: python
    source-tag: v0.17.0
    build-packages:
      - build-essential
      - curl
      - gcc-12
      - g++-12
      - git
      - libnuma-dev
      - pkg-config
      - python3.10-dev
      - python3.10-venv
      - python3-pip

    overlay-packages:
      - python3.10
      - python3.10-venv
      - python3-pip
      - google-perftools
      - libjemalloc2
      - libnuma1
      - numactl
      - libgl1
      - libglib2.0-0
      - curl

    override-build: |
      set -eux

      # Match upstream: prefer GCC/G++ 12.
      update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 10 --slave /usr/bin/g++ g++ /usr/bin/g++-12
      ln -sf "$(which python3)" /usr/bin/python

      # Install uv if not already installed.
      which uv > /dev/null || (curl -LsSf https://astral.sh/uv/install.sh | sh && ln -sf /root/.local/bin/uv /usr/local/bin/uv)
      export PATH="/root/.local/bin:$PATH"

      # Activate virtual environment.
      uv venv ./python_venv
      export VIRTUAL_ENV=$PWD/python_venv
      export PATH="$VIRTUAL_ENV/bin:$PATH"

      TORCH_VERSION="2.10.0"
      TORCH_EXTRA_INDEX_URL="https://download.pytorch.org/whl/cpu"
      VLLM_VERSION="0.15.1"

      # Install kserve using uv.
      cd python/kserve && uv sync --active --no-cache && uv cache clean && cd ../..

      # Install storage using uv.
      cd python/storage && uv sync --active --no-cache && uv cache clean && cd ../..
      cd python/storage && uv pip install . --no-cache && uv cache clean && cd ../..

      # Install huggingfaceserver using uv with Torch from CPU index.
      cd python/huggingfaceserver && \
        uv pip install --no-cache-dir --index-url "${TORCH_EXTRA_INDEX_URL}" \
          torch=="${TORCH_VERSION}" \
          torchvision \
          torchaudio && \
        uv sync --active --no-cache && \
        uv cache clean && \
        cd ../..

      # Build and install vLLM (CPU).
      export VLLM_CPU_DISABLE_AVX512="true"
      export VLLM_CPU_AVX512BF16="1"
      export VLLM_TARGET_DEVICE="cpu"

      git clone --single-branch --branch "v${VLLM_VERSION}" https://github.com/vllm-project/vllm.git

      # Install vLLM CPU build/runtime requirements, then build wheel.
      (cd vllm && \
        uv pip install --no-cache -v --index-strategy unsafe-best-match --extra-index-url "${TORCH_EXTRA_INDEX_URL}" -r requirements/cpu-build.txt)
      uv cache clean
      (cd vllm && \
        uv pip install --no-cache -v --index-strategy unsafe-best-match --extra-index-url "${TORCH_EXTRA_INDEX_URL}" -r requirements/cpu.txt)
      uv cache clean
      (cd vllm && python setup.py bdist_wheel)

      # Install the built wheel.
      uv pip install --no-cache vllm/dist/vllm-${VLLM_VERSION}*.whl
      uv cache clean

      # Third-party licenses (mirror upstream).
      cd python
      cp -f third_party/pip-licenses.py ./pip-licenses.py
      uv pip install --no-cache tomli
      mkdir -p third_party/library
      python3 pip-licenses.py
      cd ..

      # Promote installed packages into the primed image.
      mkdir -p ${CRAFT_PART_INSTALL}/usr/local/lib/python3.10/dist-packages
      cp -fr "$VIRTUAL_ENV/lib/python3.10/site-packages/." ${CRAFT_PART_INSTALL}/usr/local/lib/python3.10/dist-packages/

      # Mirror upstream runtime source-tree layout.
      cp -fr python/huggingfaceserver ${CRAFT_PART_INSTALL}/huggingfaceserver
      cp -fr python/kserve ${CRAFT_PART_INSTALL}/kserve
      cp -fr python/storage ${CRAFT_PART_INSTALL}/storage

      # Ensure modules are importable if uv keeps workspace source deps.
      cp -fr python/huggingfaceserver ${CRAFT_PART_INSTALL}/usr/local/lib/python3.10/dist-packages/
      cp -fr python/kserve ${CRAFT_PART_INSTALL}/usr/local/lib/python3.10/dist-packages/
      cp -fr python/storage ${CRAFT_PART_INSTALL}/usr/local/lib/python3.10/dist-packages/

      # Ensure `python` exists in the primed image.
      mkdir -p ${CRAFT_PART_INSTALL}/usr/bin
      ln -sf /usr/bin/python3.10 ${CRAFT_PART_INSTALL}/usr/bin/python

      # Third-party licenses payload.
      mkdir -p ${CRAFT_PART_INSTALL}/third_party
      cp -fr python/third_party/. ${CRAFT_PART_INSTALL}/third_party/
