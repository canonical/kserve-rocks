# Based on https://github.com/kserve/kserve/blob/v0.17.0/python/sklearn.Dockerfile
# 
# See ../CONTRIBUTING.md for more details about the patterns used in this rock. 
# This rock is implemented with some atypical patterns due to the nature of the upstream
# Dockerfile.
name: sklearnserver
summary: sklearn server for Kserve deployments
description: "Kserve sklearn server"
version: "0.17.0"
license: Apache-2.0
base: ubuntu@22.04
platforms:
    amd64:
run-user: _daemon_
services:
  sklearnserver:
    override: replace
    summary: "sklearn server service"
    startup: enabled
    command: "python -m sklearnserver [ dummy-arguments ]"
    environment:
      PYTHONPATH: /sklearnserver
entrypoint-service: sklearnserver

parts:
  security-team-requirement:
    plugin: nil
    override-build: |
      mkdir -p ${CRAFT_PART_INSTALL}/usr/share/rocks
      (echo "# os-release" && cat /etc/os-release && echo "# dpkg-query" && \
      dpkg-query --root=${CRAFT_PROJECT_DIR}/../bundles/ubuntu-22.04/rootfs/ -f '${db:Status-Abbrev},${binary:Package},${Version},${source:Package},${Source:Version}\n' -W) \
      > ${CRAFT_PART_INSTALL}/usr/share/rocks/dpkg.query

  python:
    plugin: nil
    source: https://github.com/kserve/kserve.git
    source-subdir: python
    source-tag: v0.17.0
    build-packages:
      - build-essential
      - libgomp1
      - python3.11
      - python3.11-venv
      - python3-venv
    overlay-packages:
      - python3.11
    override-build: |
      # Install uv
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="/root/.local/bin:$PATH"

      # Setup virtual environment
      uv venv ./python_venv
      export VIRTUAL_ENV=$PWD/python_venv
      export PATH="$VIRTUAL_ENV/bin:$PATH"

      # Install the kserve, storage, and sklearnserver packages with their dependencies using uv

      # Install kserve
      cd python/kserve && uv sync --active --no-cache && cd ../..

      # Install storage  
      cd python/storage && uv sync --active --no-cache && cd ../..
      cd python/storage && uv pip install . --no-cache && cd ../..
      
      # Install sklearnserver - use uv sync for dependencies, then pip install for the package
      cd python/sklearnserver && uv sync --active --no-cache && cd ../..
      cd python/sklearnserver && uv pip install . --no-cache && cd ../..

      # Promote the packages we've installed from the virtual env to the primed image
      mkdir -p $CRAFT_PART_INSTALL/usr/local/lib/python3.11/dist-packages
      cp -fr ./python_venv/lib/python3.11/site-packages/* $CRAFT_PART_INSTALL/usr/local/lib/python3.11/dist-packages/

      # Mirror the upstream runtime layout. The sklearnserver entrypoint relies on the
      # source tree being present at /sklearnserver via PYTHONPATH.
      cp -fr python/kserve $CRAFT_PART_INSTALL/kserve
      cp -fr python/storage $CRAFT_PART_INSTALL/storage
      cp -fr python/sklearnserver $CRAFT_PART_INSTALL/sklearnserver

      # Ensure the sklearnserver module is importable even if uv leaves it as a
      # workspace source dependency rather than a regular site-packages install.
      cp -fr python/sklearnserver/sklearnserver $CRAFT_PART_INSTALL/usr/local/lib/python3.11/dist-packages/

      # Ensure `python` is an executable command in our primed image by making
      # a symbolic link
      mkdir -p $CRAFT_PART_INSTALL/usr/bin/
      ln -s /usr/bin/python3.11 $CRAFT_PART_INSTALL/usr/bin/python

      # Generate third-party licenses
      cd python
      cp third_party/pip-licenses.py pip-licenses.py
      uv pip install --no-cache-dir tomli requests
      mkdir -p third_party/library && python3 pip-licenses.py
      mkdir ${CRAFT_PART_INSTALL}/third_party
      cp -r third_party/ ${CRAFT_PART_INSTALL}/third_party
